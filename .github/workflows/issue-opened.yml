name: Issue opened

on:
  issues:
    types: 
      - opened

permissions:
  contents: read

jobs:
  notify-external:
    uses: cds-snc/design-gc-conception/.github/workflows/issue-notify-external.yml@cf4203b8c3993394eeb49a2a15f1254348e3d041
    secrets: inherit
    with:
      issue_creator: ${{ github.event.issue.user.login }}
      issue_title: ${{ github.event.issue.title }}
      issue_url: ${{ github.event.issue.html_url }}
      issue_number: ${{ github.event.issue.number }}
