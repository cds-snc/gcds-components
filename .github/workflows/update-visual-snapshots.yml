name: Update visual snapshots

on:
  workflow_dispatch:
    inputs:
      branch:
        description: 'Branch to update snapshots on (your PR branch)'
        required: true
        type: string

permissions:
  contents: write

jobs:
  update-snapshots:
    name: Update visual baselines on ${{ inputs.branch }}
    runs-on: ubuntu-22.04
    steps:
      - name: Git Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          ref: ${{ inputs.branch }}
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-node@dda4788290998366da86b6a4f497909644397bb2
        with:
          node-version: 22

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium
        working-directory: packages/web

      - name: Build repo
        run: npm run build

      - name: Update visual snapshots
        run: npm run test:visual:update
        working-directory: packages/web

      - name: Commit updated baselines
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add packages/web/src/components/**/tests/__screenshots__
          # Only commit if there are actual changes
          git diff --staged --quiet || git commit -m "chore(visual): update snapshot baselines [skip ci]"
          git push
