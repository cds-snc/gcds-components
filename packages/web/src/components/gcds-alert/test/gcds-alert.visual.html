<!doctype html>
<html dir="ltr" lang="en">
  <head>
    <meta charset="utf-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, minimum-scale=1.0, maximum-scale=5.0"
    />
    <title>Component preview: gcds-alert</title>

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Lato:ital,wght@0,100;0,300;0,400;0,700;0,900;1,100;1,300;1,400;1,700;1,900&display=swap"
      rel="stylesheet"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Noto+Sans&display=swap"
      rel="stylesheet"
    />

    <!-- GCDS build -->
    <link rel="stylesheet" href="/build/gcds.css" />
    <script type="module" src="/build/gcds.esm.js"></script>

    <style>
      *,
      *::before,
      *::after {
        animation: none !important;
        box-sizing: border-box;
      }

      html {
        font-size: 16px;
      }

      body {
        background-color: var(--gcds-bg-white);
        color: var(--gcds-text-primary);
        font-family: var(--gcds-font-families-body), sans-serif;
        font-size: var(--gcds-font-sizes-text);
        line-height: var(--gcds-line-heights-text);
        margin: 0;
        padding: 0;
      }

      .preview-variant {
        margin-bottom: var(--gcds-spacing-600);
      }

      .preview-component {
        padding: var(--gcds-spacing-300);
      }
    </style>
  </head>

  <body>
    <main>
      <gcds-heading tag="h1">gcds-alert</gcds-heading>

      <section data-variant="default" class="preview-variant">
        <gcds-heading tag="h2">Default</gcds-heading>
        <div class="preview-component">
          <gcds-alert heading="Alert heading">
            <gcds-text margin-bottom="0">Alert message content.</gcds-text>
          </gcds-alert>
        </div>
      </section>

      <section data-variant="alert-role-danger" class="preview-variant">
        <gcds-heading tag="h2">Alert role: danger</gcds-heading>
        <div class="preview-component">
          <gcds-alert alert-role="danger" heading="Alert heading">
            <gcds-text margin-bottom="0">Alert message content.</gcds-text>
          </gcds-alert>
        </div>
      </section>

      <section data-variant="alert-role-success" class="preview-variant">
        <gcds-heading tag="h2">Alert role: success</gcds-heading>
        <div class="preview-component">
          <gcds-alert alert-role="success" heading="Alert heading">
            <gcds-text margin-bottom="0">Alert message content.</gcds-text>
          </gcds-alert>
        </div>
      </section>

      <section data-variant="alert-role-warning" class="preview-variant">
        <gcds-heading tag="h2">Alert role: warning</gcds-heading>
        <div class="preview-component">
          <gcds-alert alert-role="warning" heading="Alert heading">
            <gcds-text margin-bottom="0">Alert message content.</gcds-text>
          </gcds-alert>
        </div>
      </section>

      <section data-variant="hide-close-btn" class="preview-variant">
        <gcds-heading tag="h2">Hide close button</gcds-heading>
        <div class="preview-component">
          <gcds-alert heading="Alert heading" hide-close-btn>
            <gcds-text margin-bottom="0">Alert message content.</gcds-text>
          </gcds-alert>
        </div>
      </section>

      <section data-variant="hide-role-icon" class="preview-variant">
        <gcds-heading tag="h2">Hide role icon</gcds-heading>
        <div class="preview-component">
          <gcds-alert heading="Alert heading" hide-role-icon>
            <gcds-text margin-bottom="0">Alert message content.</gcds-text>
          </gcds-alert>
        </div>
      </section>
    </main>
  </body>
</html>
