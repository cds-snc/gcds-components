<!doctype html>
<html dir="ltr" lang="en">
  <head>
    <meta charset="utf-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, minimum-scale=1.0, maximum-scale=5.0"
    />
    <title>Stencil Component Starter</title>

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Lato:ital,wght@0,100;0,300;0,400;0,700;0,900;1,100;1,300;1,400;1,700;1,900&display=swap"
      rel="stylesheet"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Noto+Sans&display=swap"
      rel="stylesheet"
    />

    <!-- Local components -->
    <link rel="stylesheet" href="/build/gcds.css" />
    <script type="module" src="/build/gcds.esm.js"></script>
    <script nomodule src="/build/gcds.js"></script>
  </head>

  <body>
    <gcds-table
      id="my-table"
      sort="true"
      pagination="true"
      pagination-current-page="1"
      pagination-size="10"
      filter="true"
      caption="Table of the best Pokémon (first generation)"
    >
      <div slot="caption">
        <h2>Pokémon</h2>
        Table of the best Pokémon (first generation).
      </div>
    </gcds-table>

    <script>
      const table = document.getElementById('my-table');

      table.columns = [
        {
          field: 'number',
          header: 'Pokédex',
          alignment: 'end',
          rowHeader: true,
        },
        {
          field: 'name',
          header: 'Name',
          sortDirection: 'asc',
        },
        { field: 'height', header: 'Height', alignment: 'end' },
        { field: 'weight', header: 'Weight', alignment: 'end' },
        {
          field: 'base_experience',
          header: 'Base experience',
          sort: false,
          alignment: 'end',
        },
      ];

      table.data = [
        {
          number: 7,
          name: 'Squirtle',
          height: 5,
          weight: 90,
          base_experience: 63,
        },
        {
          number: 8,
          name: 'Wartortle',
          height: 10,
          weight: 225,
          base_experience: 142,
        },
        {
          number: 9,
          name: 'Blastoise',
          height: 16,
          weight: 855,
          base_experience: 239,
        },
      ];

      table.paginationSizeOptions = [1, 3, 5, 10];
    </script>
  </body>
</html>
